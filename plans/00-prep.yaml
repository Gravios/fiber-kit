# Shared prep — run ONCE.  Over-clusters and realigns in place, producing the base
# .clu.stderiv.<elec>.fiber_session (+ re-extracted .spk) that every diagnostic branch below starts from.
#   fiber-pipeline <elec> --plan plans/00-prep.yaml
pipeline:
  - {stage: fiber-session, out: fiber_session}
  - {stage: fiber-realign, in: fiber_session}
